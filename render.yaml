services:
  - type: web
    name: cathedral-scanner-api
    runtime: python
    repo: https://github.com/ngenoamos/Synapse
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
