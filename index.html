<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cathedral Scanner - Blockchain Wallet Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="./output.css" rel="stylesheet">
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-16">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold text-white mb-4">🏛️ Cathedral Scanner</h1>
            <p class="text-xl text-white opacity-90">Enterprise-Grade Blockchain Analytics</p>
        </div>

        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-2">Wallet Scanner</h2>
                <p class="text-gray-600 mb-6">Enter any Ethereum or BSC wallet address to analyze risk scores</p>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Wallet Address</label>
                    <input type="text" id="walletAddress" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-mono"
                           placeholder="0xBE0eB53F46cd790Cd13851d5EFf43D12404d33E8"
                           value="0xBE0eB53F46cd790Cd13851d5EFf43D12404d33E8">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Blockchain</label>
                    <select id="chain" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <option value="ethereum">Ethereum (ETH)</option>
                        <option value="bsc">Binance Smart Chain (BNB)</option>
                    </select>
                </div>

                <button id="scanButton" 
                        class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 rounded-lg hover:opacity-90 transition">
                    🔍 Scan Wallet
                </button>

                <div id="results" class="mt-8 hidden">
                    <div class="border-t border-gray-200 pt-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">Scan Results</h3>
                        <div id="resultsContent" class="bg-gray-50 rounded-lg p-4"></div>
                    </div>
                </div>

                <div id="loading" class="mt-8 hidden text-center text-gray-600">Scanning blockchain...</div>
                <div id="error" class="mt-8 hidden bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg"></div>
            </div>
        </div>

        <div class="max-w-2xl mx-auto mt-8 text-center text-white opacity-75 text-sm">
            <p>Powered by Cathedral Scanner API | Real blockchain data</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://cathedral-scanner-api.onrender.com';
        
        async function scanWallet() {
            const wallet = document.getElementById('walletAddress').value;
            const chain = document.getElementById('chain').value;
            
            document.getElementById('results').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE}/api/scan/${wallet}?chain=${chain}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                const balanceKey = chain === 'ethereum' ? 'balance_eth' : 'balance_bnb';
                const balance = data.wallet_data[balanceKey] || 0;
                let scoreColor = data.srs_score >= 80 ? 'text-green-600' : (data.srs_score >= 50 ? 'text-yellow-600' : 'text-red-600');
                
                document.getElementById('resultsContent').innerHTML = `
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><strong>Wallet:</strong><br><span class="font-mono text-xs break-all">${data.wallet}</span></div>
                        <div><strong>Chain:</strong><br>${chain.toUpperCase()}</div>
                        <div><strong>SRS Score:</strong><br><span class="text-2xl font-bold ${scoreColor}">${data.srs_score}/100</span></div>
                        <div><strong>Risk Level:</strong><br>${data.risk_level}</div>
                        <div><strong>Balance:</strong><br>${balance.toLocaleString()} ${chain === 'ethereum' ? 'ETH' : 'BNB'}</div>
                        <div><strong>USD Value:</strong><br>$${(data.wallet_data.balance_usd || 0).toLocaleString()}</div>
                        ${data.wallet_data.transaction_count ? `<div><strong>Transactions:</strong><br>${data.wallet_data.transaction_count}</div>` : ''}
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-200 text-xs text-gray-500">Last scanned: ${new Date(data.timestamp).toLocaleString()}</div>
                `;
                document.getElementById('results').classList.remove('hidden');
            } catch (error) {
                document.getElementById('error').innerHTML = `<strong>Error:</strong> ${error.message}`;
                document.getElementById('error').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
        
        document.getElementById('scanButton').addEventListener('click', scanWallet);
        document.getElementById('walletAddress').addEventListener('keypress', (e) => e.key === 'Enter' && scanWallet());
        setTimeout(() => scanWallet(), 500);
    </script>
</body>
</html>
